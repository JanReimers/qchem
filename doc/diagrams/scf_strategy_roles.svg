<svg viewBox="0 0 960 510" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>SCF convergence: role seams, one shared extrapolator, occupation and smearing</title>
  <desc>The SCF fixed-point loop with four role interfaces (orbital-face, occupation-face, density-face, loop-face). A single shared extrapolator plugs onto EITHER the Fock residual (giving Fock-DIIS) OR the density residual (giving Pulay/Broyden) but never both. GDM/OT use the loop-face direct-min mode, which bypasses the density-mix stage.</desc>
  <rect x="0" y="0" width="960" height="510" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4a5568"/></marker>
    <marker id="ahp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b46c1"/></marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b83280"/></marker>
  </defs>

  <text x="20" y="28" font-size="18" font-weight="700" fill="#1a202c">SCF convergence — role seams, one shared extrapolator, occupation &amp; smearing</text>

  <!-- direct-min bypass (loop-face), magenta dashed over the top -->
  <path d="M455,93 C455,50 300,50 285,91" fill="none" stroke="#b83280" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#ahm)"/>
  <text x="370" y="46" font-size="11.5" text-anchor="middle" fill="#b83280" font-weight="700">«loop-face» direct-min (GDM/OT): orbitals minimised directly, no density-mix stage</text>

  <!-- fixed-point cycle: top row -->
  <rect x="20" y="93" width="140" height="54" rx="8" fill="#eef1f8" stroke="#3b4252"/>
  <text x="90" y="125" font-size="14" text-anchor="middle" fill="#1a202c">ρ_in (density)</text>

  <rect x="210" y="93" width="140" height="54" rx="8" fill="#eef1f8" stroke="#3b4252"/>
  <text x="280" y="125" font-size="14" text-anchor="middle" fill="#1a202c">build F(ρ)</text>

  <text x="470" y="84" font-size="11.5" text-anchor="middle" fill="#2b6cb0" font-weight="700">«orbital-face»</text>
  <rect x="400" y="93" width="140" height="54" rx="8" fill="#d6e8ff" stroke="#2b6cb0"/>
  <text x="470" y="116" font-size="14" text-anchor="middle" fill="#1a202c">orbital update</text>
  <text x="470" y="133" font-size="10.5" text-anchor="middle" fill="#4a5568">diag · DIIS · GDM/OT</text>

  <text x="660" y="84" font-size="11.5" text-anchor="middle" fill="#c05621" font-weight="700">«occupation-face»</text>
  <rect x="590" y="93" width="140" height="54" rx="8" fill="#ffe9c7" stroke="#c05621"/>
  <text x="660" y="116" font-size="14" text-anchor="middle" fill="#1a202c">occupy</text>
  <text x="660" y="133" font-size="10.5" text-anchor="middle" fill="#4a5568">aufbau · MOM · smearing</text>

  <rect x="780" y="93" width="140" height="54" rx="8" fill="#eef1f8" stroke="#3b4252"/>
  <text x="850" y="125" font-size="14" text-anchor="middle" fill="#1a202c">ρ_out</text>

  <!-- top-row arrows -->
  <line x1="160" y1="120" x2="206" y2="120" stroke="#4a5568" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="350" y1="120" x2="396" y2="120" stroke="#4a5568" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="540" y1="120" x2="586" y2="120" stroke="#4a5568" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="730" y1="120" x2="776" y2="120" stroke="#4a5568" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- rho_out down and left to density mix -->
  <path d="M850,147 L850,324 L584,324" fill="none" stroke="#4a5568" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- density mix (DENSITY-FACE) -->
  <text x="490" y="289" font-size="11.5" text-anchor="middle" fill="#2f855a" font-weight="700">«density-face»</text>
  <rect x="400" y="298" width="180" height="54" rx="8" fill="#d7f0d9" stroke="#2f855a"/>
  <text x="490" y="320" font-size="14" text-anchor="middle" fill="#1a202c">density mix  ρ_out→ρ_in</text>
  <text x="490" y="337" font-size="10.5" text-anchor="middle" fill="#4a5568">linear · Kerker · Pulay/Broyden</text>

  <!-- density mix left and up to rho_in -->
  <path d="M400,324 L90,324 L90,151" fill="none" stroke="#4a5568" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- extrapolator -->
  <rect x="632" y="404" width="300" height="70" rx="10" fill="#eae6ff" stroke="#6b46c1"/>
  <text x="782" y="428" font-size="13.5" text-anchor="middle" fill="#1a202c" font-weight="700">shared extrapolator</text>
  <text x="782" y="446" font-size="12.5" text-anchor="middle" fill="#1a202c">DIIS | Broyden  —  ≤ 1 active</text>
  <text x="782" y="463" font-size="10.5" text-anchor="middle" fill="#4a5568">history (xᵢ, rᵢ) → x_next; each concrete keeps its paper's names</text>

  <!-- connector to F-stream -->
  <path d="M710,404 C650,320 520,185 472,149" fill="none" stroke="#6b46c1" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ahp)"/>
  <text x="628" y="250" font-size="11" fill="#6b46c1">F-residual [F,D] → Fock-DIIS</text>

  <!-- connector to rho-stream -->
  <path d="M655,404 C600,390 560,372 560,354" fill="none" stroke="#6b46c1" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ahp)"/>
  <text x="470" y="390" font-size="11" fill="#6b46c1">ρ-residual (Kerker-precond) → Pulay/Broyden</text>

  <!-- notes -->
  <text x="20" y="424" font-size="12" fill="#4a5568">Seams = narrow interfaces named for their client.</text>
  <text x="20" y="443" font-size="12" fill="#4a5568">Each algorithm implements the seam(s) it plays; null elsewhere.</text>
  <text x="20" y="462" font-size="12" fill="#4a5568">Within a seam: Composite (ladder hand-off + preconditioner).</text>
  <text x="20" y="481" font-size="12" fill="#4a5568">Across seams: loop-face gates density · ≤1 extrapolator total.</text>
</svg>
